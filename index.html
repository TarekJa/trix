<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f59e0b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    
    <title>تركس</title>
    
    <!-- Favicons -->
    <link rel="icon" href="favicon" type="image/x-icon">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    
    <!-- Android Chrome Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png">
    
    <!-- Windows Tile -->
    <meta name="msapplication-TileImage" content="mstile-150x150.png">
    <meta name="msapplication-TileColor" content="#f59e0b">

    <link rel="manifest" href="site.webmanifest">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(to bottom, #0f172a, #1e2937);
        }
        .kingdom-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .kingdom-card:hover { transform: translateY(-5px); }
        .kingdom-card.completed {
            border-color: #10b981;
            background-color: #052e16;
        }
        .score-positive { color: #22c55e; text-shadow: 0 0 15px rgba(34,197,94,0.5); }
        .score-negative { color: #ef4444; text-shadow: 0 0 15px rgba(239,68,68,0.5); }
    </style>
</head>
<body class="min-h-screen pb-24 text-white">

    <div class="max-w-2xl mx-auto px-4">
        <!-- Header -->
        <div class="flex items-center justify-between py-6 border-b border-slate-700">
            <div class="flex items-center gap-3">
                <div class="w-14 h-14 bg-gradient-to-br from-amber-400 to-orange-500 rounded-2xl flex items-center justify-center text-4xl shadow-xl">♠️</div>
                <div>
                    <h1 class="text-4xl font-bold tracking-tighter">تركس</h1>
                    <p class="text-slate-400 text-sm">حاسبة نتائج الشراكة</p>
                </div>
            </div>
            <button onclick="resetAll()" class="flex items-center gap-2 px-6 py-3 bg-slate-800 hover:bg-slate-700 rounded-2xl text-sm font-medium transition">
                <i class="fas fa-redo"></i>
                <span>جلسة جديدة</span>
            </button>
        </div>

        <!-- Setup -->
        <div id="setupScreen" class="mt-10">
            <div id="step3">
                <h2 class="text-xl font-semibold mb-6">أدخل أسماء اللاعبين (شراكة)</h2>
                <div id="playersContainer" class="space-y-5"></div>
                
                <button onclick="startGame()" 
                        class="mt-12 w-full bg-gradient-to-r from-amber-500 to-orange-500 py-6 rounded-3xl font-bold text-xl shadow-lg active:scale-95 transition">
                    ابدأ الجلسة
                </button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="gameScreen" class="hidden">
            <div class="flex justify-between items-center mb-6 text-sm text-slate-400">
                <div id="sessionDate"></div>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-8" id="kingdomGrid"></div>

            <div id="teamsDisplay" class="space-y-4 mb-10"></div>

            <div id="inputPanel" class="bg-slate-900 border border-slate-700 rounded-3xl p-6 hidden">
                <h3 class="text-center text-2xl font-bold mb-6" id="panelTitle"></h3>
                
                <div class="space-y-6">
                    <div>
                        <label class="block text-slate-400 mb-2">التركس</label>
                        <select id="trixSelect" class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 text-2xl text-center">
                            <option value="0">0</option>
                            <option value="150">150</option>
                            <option value="200">200</option>
                            <option value="250">250</option>
                            <option value="300">300</option>
                            <option value="350">350</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-slate-400 mb-2">عدد البنات</label>
                            <select id="girlsSelect" class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4"></select>
                        </div>
                        <div>
                            <label class="block text-slate-400 mb-2">الختيار</label>
                            <select id="kingSelect" class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4">
                                <option value="0">لم يأكل</option>
                                <option value="1">أكل</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-slate-400 mb-2">الديناري</label>
                            <select id="dinarSelect" class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4"></select>
                        </div>
                        <div>
                            <label class="block text-slate-400 mb-2">اللطوش</label>
                            <select id="lutooshSelect" class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4"></select>
                        </div>
                    </div>
                </div>

                <button onclick="saveKingdom()" 
                        class="mt-10 w-full bg-gradient-to-r from-emerald-500 to-teal-500 py-6 rounded-3xl font-bold text-xl active:scale-95">
                    حفظ المملكة
                </button>
            </div>
        </div>

        <!-- Final Screen -->
        <div id="finalScreen" class="hidden">
            <div class="text-center py-12">
                <i class="fas fa-crown text-7xl text-amber-400 mb-4"></i>
                <h2 class="text-3xl font-bold text-amber-400">الفائز</h2>
                <div id="winnerDisplay" class="mt-6 text-5xl font-bold"></div>
                <div id="winnerScore" class="text-6xl font-black mt-3"></div>
                <div id="sessionInfo" class="text-slate-400 mt-8 text-sm"></div>
            </div>

            <div id="finalResults" class="space-y-4"></div>

            <div class="flex gap-4 mt-16">
                <button onclick="shareAsImage()" 
                        class="flex-1 bg-gradient-to-r from-violet-500 to-purple-600 py-6 rounded-3xl font-bold text-lg flex items-center justify-center gap-3">
                    <i class="fas fa-share-alt"></i>
                    مشاركة النتيجة
                </button>
                <button onclick="resetAll()" 
                        class="flex-1 bg-slate-700 hover:bg-slate-600 py-6 rounded-3xl font-bold text-lg">
                    جلسة جديدة
                </button>
            </div>
        </div>
    </div>

    <script>
        let teams = [];
        let completedKingdoms = new Set();
        let sessionDate = new Date();
        let players = [];

        function renderPlayerInputs() {
            const container = document.getElementById('playersContainer');
            container.innerHTML = `
                <div class="bg-emerald-900/30 border border-emerald-500 rounded-3xl p-6">
                    <p class="text-emerald-400 font-bold mb-3">الفريق الأول</p>
                    <div class="flex gap-3">
                        <input id="p0" value="أحمد" class="flex-1 bg-slate-800 rounded-2xl px-5 py-4 text-lg">
                        <input id="p2" value="علي" class="flex-1 bg-slate-800 rounded-2xl px-5 py-4 text-lg">
                    </div>
                </div>
                <div class="bg-sky-900/30 border border-sky-500 rounded-3xl p-6 mt-4">
                    <p class="text-sky-400 font-bold mb-3">الفريق الثاني</p>
                    <div class="flex gap-3">
                        <input id="p1" value="محمد" class="flex-1 bg-slate-800 rounded-2xl px-5 py-4 text-lg">
                        <input id="p3" value="خالد" class="flex-1 bg-slate-800 rounded-2xl px-5 py-4 text-lg">
                    </div>
                </div>
            `;
        }

        function startGame() {
            players = [
                { name: document.getElementById('p0').value.trim() || "أحمد" },
                { name: document.getElementById('p1').value.trim() || "محمد" },
                { name: document.getElementById('p2').value.trim() || "علي" },
                { name: document.getElementById('p3').value.trim() || "خالد" }
            ];

            teams = [
                { name: `${players[0].name} & ${players[2].name}`, total: 0 },
                { name: `${players[1].name} & ${players[3].name}`, total: 0 }
            ];

            document.getElementById('setupScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.remove('hidden');

            document.getElementById('sessionDate').innerHTML = `
                ${sessionDate.toLocaleDateString('ar-SY', { weekday: 'long', month: 'long', day: 'numeric' })} 
                • ${sessionDate.toLocaleTimeString('ar-SY', { hour: '2-digit', minute: '2-digit' })}
            `;

            renderKingdomGrid();
            renderTeamsDisplay();
            populateSelects();
        }

        function renderKingdomGrid() {
            const grid = document.getElementById('kingdomGrid');
            grid.innerHTML = '';
            for (let i = 0; i < 4; i++) {
                const completed = completedKingdoms.has(i);
                const card = document.createElement('div');
                card.className = `kingdom-card bg-slate-800 border ${completed ? 'completed border-emerald-500' : 'border-slate-600'} rounded-3xl p-6 cursor-pointer`;
                card.innerHTML = `
                    <div class="font-bold text-xl mb-1">مملكة ${i+1}</div>
                    <div class="text-slate-400">${players[i].name}</div>
                `;
                if (!completed) card.onclick = () => openKingdom(i);
                grid.appendChild(card);
            }
        }

        function renderTeamsDisplay() {
            const cont = document.getElementById('teamsDisplay');
            cont.innerHTML = `
                <div class="bg-slate-900 border border-emerald-500 rounded-3xl p-6">
                    <div class="flex justify-between items-center">
                        <div class="font-bold text-xl">${teams[0].name}</div>
                        <div id="team0" class="text-5xl font-black score-positive">0</div>
                    </div>
                </div>
                <div class="bg-slate-900 border border-sky-500 rounded-3xl p-6">
                    <div class="flex justify-between items-center">
                        <div class="font-bold text-xl">${teams[1].name}</div>
                        <div id="team1" class="text-5xl font-black score-positive">0</div>
                    </div>
                </div>
            `;
        }

        function populateSelects() {
            document.getElementById('girlsSelect').innerHTML = Array.from({length:5}, (_,i) => `<option value="${i}">${i} بنات</option>`).join('');
            document.getElementById('dinarSelect').innerHTML = Array.from({length:14}, (_,i) => `<option value="${i}">${i} ديناري</option>`).join('');
            document.getElementById('lutooshSelect').innerHTML = Array.from({length:14}, (_,i) => `<option value="${i}">${i} لطوش</option>`).join('');
        }

        let currentKingdomIndex;
        function openKingdom(index) {
            if (completedKingdoms.has(index)) return;
            currentKingdomIndex = index;
            document.getElementById('panelTitle').innerHTML = `مملكة ${index+1} — ${players[index].name}`;
            document.getElementById('inputPanel').classList.remove('hidden');

            document.getElementById('trixSelect').value = "0";
            document.getElementById('girlsSelect').value = "0";
            document.getElementById('kingSelect').value = "0";
            document.getElementById('dinarSelect').value = "0";
            document.getElementById('lutooshSelect').value = "0";
        }

        function saveKingdom() {
            const idx = currentKingdomIndex;
            const trix = parseInt(document.getElementById('trixSelect').value) || 0;
            const girls = parseInt(document.getElementById('girlsSelect').value) || 0;
            const king = parseInt(document.getElementById('kingSelect').value) || 0;
            const dinar = parseInt(document.getElementById('dinarSelect').value) || 0;
            const lutoosh = parseInt(document.getElementById('lutooshSelect').value) || 0;

            let points = trix - girls*25 - king*75 - dinar*10 - lutoosh*15;

            const isTeamA = (idx === 0 || idx === 2);
            const teamA = isTeamA ? 0 : 1;
            const teamB = 1 - teamA;

            const trixB = 500 - trix;
            const girlsB = 4 - girls;
            const kingB = 1 - king;
            const dinarB = 13 - dinar;
            const lutooshB = 13 - lutoosh;

            const pointsB = trixB - girlsB*25 - kingB*75 - dinarB*10 - lutooshB*15;

            teams[teamA].total += points;
            teams[teamB].total += pointsB;

            completedKingdoms.add(idx);
            renderKingdomGrid();
            updateScores();

            document.getElementById('inputPanel').classList.add('hidden');

            if (completedKingdoms.size === 4) {
                setTimeout(showFinalScreen, 800);
            }
        }

        function updateScores() {
            document.getElementById('team0').textContent = Math.round(teams[0].total);
            document.getElementById('team1').textContent = Math.round(teams[1].total);
            document.getElementById('team0').className = `text-5xl font-black ${teams[0].total >= 0 ? 'score-positive' : 'score-negative'}`;
            document.getElementById('team1').className = `text-5xl font-black ${teams[1].total >= 0 ? 'score-positive' : 'score-negative'}`;
        }

        function showFinalScreen() {
            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('finalScreen').classList.remove('hidden');

            const winner = teams[0].total > teams[1].total ? teams[0] : teams[1];

            document.getElementById('winnerDisplay').innerHTML = `${winner.name} 👑`;
            document.getElementById('winnerScore').innerHTML = `
                <span class="${winner.total >= 0 ? 'score-positive' : 'score-negative'}">
                    ${winner.total >= 0 ? '+' : ''}${Math.round(winner.total)}
                </span>
            `;

            document.getElementById('sessionInfo').innerHTML = `
                ${sessionDate.toLocaleDateString('ar-SY', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })} 
                • ${sessionDate.toLocaleTimeString('ar-SY', { hour: '2-digit', minute: '2-digit' })}
            `;

            const container = document.getElementById('finalResults');
            container.innerHTML = `
                <div class="bg-slate-900 rounded-3xl p-6 border border-emerald-500">
                    <div class="flex justify-between items-center">
                        <div class="font-bold">${teams[0].name}</div>
                        <div class="${teams[0].total >= 0 ? 'score-positive' : 'score-negative'} text-4xl">${Math.round(teams[0].total)}</div>
                    </div>
                </div>
                <div class="bg-slate-900 rounded-3xl p-6 border border-sky-500">
                    <div class="flex justify-between items-center">
                        <div class="font-bold">${teams[1].name}</div>
                        <div class="${teams[1].total >= 0 ? 'score-positive' : 'score-negative'} text-4xl">${Math.round(teams[1].total)}</div>
                    </div>
                </div>
            `;
        }

        function shareAsImage() {
            showToast("🎉 تم حفظ الصورة!\nالفائز: " + (teams[0].total > teams[1].total ? teams[0].name : teams[1].name));
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.style.cssText = "position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#10b981;color:white;padding:16px 28px;border-radius:9999px;font-weight:600;box-shadow:0 10px 15px -3px rgba(0,0,0,0.4);z-index:100;";
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3500);
        }

        function resetAll() {
            if (confirm("هل تريد بدء جلسة جديدة؟")) location.reload();
        }

        window.onload = () => {
            renderPlayerInputs();
        };
    </script>
</body>
</html>
