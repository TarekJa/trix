<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تركس فخم</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Cairo', sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e2937, #020617);
    }
    .card {
        transition: all 0.3s ease;
    }
    .card:hover {
        transform: translateY(-8px) scale(1.03);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
    }
    .btn {
        background: linear-gradient(to right, #f59e0b, #ea580c);
        transition: all 0.3s ease;
    }
    .btn:hover {
        transform: scale(1.05);
        box-shadow: 0 10px 15px rgba(245, 158, 11, 0.4);
    }
    .input {
        background: #1e2937;
        border: 2px solid #334155;
        transition: all 0.3s;
    }
    .input:focus {
        border-color: #f59e0b;
        box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.2);
    }
    .score-positive { color: #22c55e; text-shadow: 0 0 25px rgba(34, 197, 94, 0.8); }
    .score-negative { color: #ef4444; text-shadow: 0 0 25px rgba(239, 68, 68, 0.8); }
</style>
</head>
<body class="text-white min-h-screen">
<div class="max-w-2xl mx-auto p-6">

<!-- HEADER -->
<div class="text-center mb-8">
    <h1 class="font-black tracking-wider mb-2 leading-tight whitespace-nowrap"
        style="font-size: clamp(2rem, 6vw, 3rem);">
        🃏♠️♥️ <span class="text-amber-300">تركس</span> ♦️♣️ 🃏
    </h1>
    <p class="text-amber-300"
       style="font-size: clamp(1.5rem, 3.5vw, 2rem);">
        تسجيل و توثيق 😉 📝
    </p>
</div>

    <!-- SETUP -->
    <div id="setup">
        <div class="grid grid-cols-2 gap-4">
            <input id="p0" class="input p-4 rounded-2xl text-center text-lg" placeholder="لاعب 1">
            <input id="p2" class="input p-4 rounded-2xl text-center text-lg" placeholder="لاعب 2 (شريك)">
            <input id="p1" class="input p-4 rounded-2xl text-center text-lg" placeholder="لاعب 3">
            <input id="p3" class="input p-4 rounded-2xl text-center text-lg" placeholder="لاعب 4 (شريك)">
        </div>
        <button onclick="startGame()" class="btn w-full mt-8 py-5 text-xl font-bold rounded-3xl shadow-lg">
            🚀 ابدأ اللعبة
        </button>
    </div>

    <!-- GAME -->
    <div id="game" class="hidden">
        <div id="kingdoms" class="grid grid-cols-2 gap-4"></div>

        <div id="scores" class="mt-8 bg-slate-900/70 backdrop-blur-xl p-6 rounded-3xl"></div>

        <!-- Panel -->
        <div id="panel" class="hidden mt-8 bg-slate-900/90 backdrop-blur-2xl p-8 rounded-3xl border border-amber-500/30">
            <h3 id="panelTitle" class="text-2xl font-bold text-amber-300 mb-6 text-center"></h3>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-amber-400 mb-2 text-lg">♠️♥️التركس♦️♣️ </label>
                    <select id="trix" class="select w-full p-4 bg-slate-800 rounded-2xl text-xl"></select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-pink-400 mb-2 text-lg">👸 البنات</label>
                        <select id="girls" class="select w-full p-4 bg-slate-800 rounded-2xl text-xl"></select>
                    </div>
                    <div>
                        <label class="block text-rose-400 mb-2 text-lg">👑 الختيار</label>
                        <select id="king" class="select w-full p-4 bg-slate-800 rounded-2xl text-xl">
                            <option value="0">لم يأكل</option>
                            <option value="1">أكل 👑</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-yellow-400 mb-2 text-lg">♦️ الديناري</label>
                        <select id="dinar" class="select w-full p-4 bg-slate-800 rounded-2xl text-xl"></select>
                    </div>
                    <div>
                        <label class="block text-orange-400 mb-2 text-lg">🃏 اللطوش</label>
                        <select id="lutoosh" class="select w-full p-4 bg-slate-800 rounded-2xl text-xl"></select>
                    </div>
                </div>
            </div>

            <button onclick="save()" class="btn w-full mt-10 py-5 text-xl font-bold rounded-3xl">
                💾 حفظ المملكة
            </button>
        </div>
    </div>

    <!-- FINAL SCREEN -->
    <div id="final" class="hidden text-center">
        <button onclick="location.reload()" class="absolute top-6 left-6 bg-slate-700 hover:bg-slate-600 px-5 py-3 rounded-2xl text-sm">
            🔄 لعبة جديدة
        </button>

        <div id="winner" class="mt-12 mb-10"></div>
        <div id="finalScores" class="mb-10"></div>

        <button onclick="exportImage()" class="btn w-full py-6 text-2xl font-bold rounded-3xl shadow-2xl flex items-center justify-center gap-3">
            📸 توثيق النتيجة بفخامة
        </button>
    </div>
</div>

<script>
let players = [], teams = [], done = new Set(), log = [];
let current = null;
let gameStartTime = null;
let kingdomStartTime = null;

function startGame() {
    players = [
        document.getElementById('p0').value || "لاعب 1",
        document.getElementById('p1').value || "لاعب 2",
        document.getElementById('p2').value || "لاعب 3",
        document.getElementById('p3').value || "لاعب 4"
    ];

    teams = [
        { name: players[0] + " & " + players[2], score: 0 },
        { name: players[1] + " & " + players[3], score: 0 }
    ];

    gameStartTime = Date.now();
    document.getElementById('setup').classList.add('hidden');
    document.getElementById('game').classList.remove('hidden');
    
    fillSelects();
    renderKingdoms();
    renderScores();
}

function fillSelects() {
    const trix = document.getElementById('trix');
    trix.innerHTML = [0,150,200,250,300,350].map(v => `<option value="${v}">${v}</option>`).join('');

    const girls = document.getElementById('girls');
    girls.innerHTML = [0,1,2,3,4].map(v => `<option value="${v}">${v}</option>`).join('');

    const dinar = document.getElementById('dinar');
    dinar.innerHTML = [...Array(14)].map((_,i) => `<option value="${i}">${i}</option>`).join('');

    const lutoosh = document.getElementById('lutoosh');
    lutoosh.innerHTML = [...Array(14)].map((_,i) => `<option value="${i}">${i}</option>`).join('');
}

function renderKingdoms() {
    const container = document.getElementById('kingdoms');
    container.innerHTML = '';
    
    for(let i = 0; i < 4; i++) {
        const div = document.createElement('div');
        div.className = `card bg-slate-800/90 p-6 rounded-3xl text-center cursor-pointer border border-slate-700 hover:border-amber-400`;
        div.innerHTML = `
            <div class="text-4xl mb-3">🏰</div>
            <div class="font-bold text-xl">مملكة ${i+1}</div>
            <div class="text-amber-300 mt-1">${players[i]}</div>
            ${done.has(i) ? '<div class="text-green-400 mt-2">✅ مكتملة</div>' : ''}
        `;
        if(!done.has(i)) div.onclick = () => openKingdom(i);
        container.appendChild(div);
    }
}

function renderScores() {
    const scoresDiv = document.getElementById('scores');
    const s0 = teams[0].score;
    const s1 = teams[1].score;
    
    scoresDiv.innerHTML = `
        <div class="grid grid-cols-2 gap-8 text-center">
            <div>
                <div class="text-emerald-400 text-sm font-bold">الفريق الأخضر</div>
                <div class="text-5xl font-black ${s0 >= 0 ? 'score-positive' : 'score-negative'}">${s0}</div>
                <div class="text-slate-400 text-sm mt-1">${teams[0].name}</div>
            </div>
            <div>
                <div class="text-sky-400 text-sm font-bold">الفريق الأزرق</div>
                <div class="text-5xl font-black ${s1 >= 0 ? 'score-positive' : 'score-negative'}">${s1}</div>
                <div class="text-slate-400 text-sm mt-1">${teams[1].name}</div>
            </div>
        </div>
    `;
}

function openKingdom(i) {
    current = i;
    kingdomStartTime = Date.now();
    
    document.getElementById('panel').classList.remove('hidden');
    document.getElementById('panelTitle').innerHTML = `🏰 مملكة ${i+1} - ${players[i]}`;
    
    // Reset values
    document.getElementById('trix').value = 0;
    document.getElementById('girls').value = 0;
    document.getElementById('king').value = 0;
    document.getElementById('dinar').value = 0;
    document.getElementById('lutoosh').value = 0;
}

function save() {
    const t = +document.getElementById('trix').value;
    const g = +document.getElementById('girls').value;
    const k = +document.getElementById('king').value;
    const d = +document.getElementById('dinar').value;
    const l = +document.getElementById('lutoosh').value;

    const A = t - g*25 - k*75 - d*10 - l*15;
    const B = (500 - t) - (4 - g)*25 - (1 - k)*75 - (13 - d)*10 - (13 - l)*15;

    const teamA = current % 2 === 0 ? 0 : 1;
    teams[teamA].score += A;
    teams[1 - teamA].score += B;

    const duration = Math.floor((Date.now() - kingdomStartTime) / 1000);

    log.push({
        kingdom: current + 1,
        player: players[current],
        time: duration,
        trix: t,
        girls: g,
        king: k,
        dinar: d,
        lutoosh: l
    });

    done.add(current);
    document.getElementById('panel').classList.add('hidden');
    
    renderKingdoms();
    renderScores();

    if(done.size === 4) finishGame();
}

function finishGame() {
    document.getElementById('game').classList.add('hidden');
    document.getElementById('final').classList.remove('hidden');

    const s0 = teams[0].score;
    const s1 = teams[1].score;
    const winnerTeam = s0 > s1 ? teams[0] : teams[1];
    const isDraw = s0 === s1;

    let winnerHTML = '';

    if(isDraw) {
        winnerHTML = `
            <div class="text-6xl mb-4">🤝</div>
            <div class="text-4xl font-black text-amber-300">تعادل!</div>
            <p class="text-2xl mt-4 text-slate-400">دق وأخوه للحسم 😄</p>
        `;
    } else {
        winnerHTML = `
            <div class="inline-flex items-center gap-4 bg-gradient-to-r from-amber-400 to-yellow-500 text-slate-900 px-10 py-6 rounded-3xl text-5xl font-black shadow-2xl">
                👑 ${winnerTeam.name}
            </div>
            <div class="flex justify-center gap-6 mt-8 text-6xl">
                👏😂🎉
            </div>
            <p class="text-3xl mt-6 text-amber-300 font-bold">الفريق الفائز</p>
        `;
    }

    document.getElementById('winner').innerHTML = winnerHTML;

    // Final Scores
    document.getElementById('finalScores').innerHTML = `
        <div class="grid grid-cols-2 gap-10 text-center max-w-md mx-auto">
            <div class="${s0 >= 0 ? 'score-positive' : 'score-negative'}">
                <div class="text-6xl font-black">${s0}</div>
                <div class="text-sm mt-2">${teams[0].name}</div>
            </div>
            <div class="${s1 >= 0 ? 'score-positive' : 'score-negative'}">
                <div class="text-6xl font-black">${s1}</div>
                <div class="text-sm mt-2">${teams[1].name}</div>
            </div>
        </div>
    `;
}

async function exportImage() {
    const totalTime = Math.floor((Date.now() - gameStartTime) / 1000);
    const minutes = Math.floor(totalTime / 60);
    const seconds = totalTime % 60;
    const totalTimeStr = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;

    const s0 = teams[0].score;
    const s1 = teams[1].score;
    const isDraw = s0 === s1;
    const winnerName = isDraw ? "تعادل" : (s0 > s1 ? teams[0].name : teams[1].name);

    const today = new Date().toLocaleDateString('ar-SA');

    let box = document.createElement("div");
    box.style.cssText = `
        padding: 30px; 
        background: linear-gradient(135deg, #0f172a, #1e2937);
        color: white; 
        width: 420px; 
        font-family: Cairo, sans-serif;
        border-radius: 20px;
        box-shadow: 0 0 40px rgba(245, 158, 11, 0.3);
    `;

    box.innerHTML = `
        <div style="text-align:center; margin-bottom:20px">
            <div style="font-size:42px; margin-bottom:8px">♠️♥️🃏♦️♣️</div>
            <h2 style="font-size:28px; font-weight:900; color:#fcd34d">${isDraw ? '🤝 تعادل' : '👑 الفريق الفائز'}</h2>
            <p style="font-size:22px; color:#f59e0b; margin-top:8px">${winnerName}</p>
            <p style="color:#94a3b8; margin-top:12px">📅 ${today}</p>
        </div>

        <div style="background:#1e2937; padding:15px; border-radius:16px; margin:20px 0;">
            ${log.map(x => `
                <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #334155;">
                    <div>
                        <strong>🏰 مملكة ${x.kingdom}</strong><br>
                        <span style="color:#cbd5e1">${x.player}</span>
                    </div>
                    <div style="text-align:right; color:#94a3b8">
                        ⏱ ${x.time} ث<br>
                        ♥️♠️♦️♣️ ${x.trix} | 👸 ${x.girls} | 👑 ${x.king}<br>
                        ♦️ ${x.dinar} | 🃏 ${x.lutoosh}
                    </div>
                </div>
            `).join('')}
        </div>

        <div style="text-align:center; margin-top:25px; font-size:22px">
            <div style="color:#ef4444">🔴 ${teams[0].name}: <strong>${teams[0].score}</strong></div>
            <div style="color:#22c55e; margin-top:8px">🟢 ${teams[1].name}: <strong>${teams[1].score}</strong></div>
        </div>

        <div style="text-center mt-8 text-slate-400 text-sm">
            الوقت الكلي: ${totalTimeStr} دقيقة
        </div>
    `;

    document.body.appendChild(box);

    const canvas = await html2canvas(box, { scale: 3, backgroundColor: "#0f172a" });
    const link = document.createElement("a");
    link.download = `تركس_${winnerName}_${today}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();

    box.remove();
}
</script>
</body>
</html>
